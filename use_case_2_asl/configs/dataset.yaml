# YOLOv8 Dataset Configuration for ASL Detection
# 10 ASL classes (A, B, C, D, E, L, V, Y, thumbsup, thumbsdown)

path: ../data   # dataset root dir
train: images/train
val: images/val
test: images/test

# Number of classes
nc: 10

# Class names (ASL hand signs)
names:
  0: A
  1: B
  2: C
  3: D
  4: E
  5: L
  6: V
  7: Y
  8: thumbsup
  9: thumbsdown
